<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Linux Distro Selector for 2026 - being made now</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
  </style>
</head>
<body>
  <form>
    <label>Device Purpose:</label>
    <br />
  <label>
    <input type="checkbox" name="activity" value="browsing">
    Browsing
  </label><br>
  <label>
    <input type="checkbox" name="activity" value="gaming">
    Gaming
  </label><br>
  <label>
    <input type="checkbox" name="activity" value="work">
    Work
  </label>
    <label for="gpu">Graphics Card (GPU):</label>
    <select name="gpu">
      <option value="amd">AMD</option>
      <option value="nvidia">NVIDIA</option>
      <option value="intel">Intel</option>
    </select>
  </form>
</body>
</html>
